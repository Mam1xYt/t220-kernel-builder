name: Build Kernel for Droidspaces

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up environment
        run: |
          echo "KERNEL_SOURCE=https://github.com/gta7lite/android_kernel_samsung_ot8" >> $GITHUB_ENV
          echo "KERNEL_SOURCE_BRANCH=master" >> $GITHUB_ENV
          echo "KERNEL_CONFIG=exynos850-gta7litewifi_defconfig" >> $GITHUB_ENV
          echo "KERNEL_IMAGE=Image.gz" >> $GITHUB_ENV
          echo "CLANG_VERSION=17.0.0" >> $GITHUB_ENV
          echo "EXTRA_CMD=LLVM=1 LLVM_IAS=1 ARCH=arm64" >> $GITHUB_ENV
          echo "DISABLE_LTO=true" >> $GITHUB_ENV
          echo "USE_OVERLAYS=true" >> $GITHUB_ENV
          echo "NEED_DTBO=true" >> $GITHUB_ENV

      - name: Clone kernel source
        run: |
          git clone $KERNEL_SOURCE --depth=1 --branch $KERNEL_SOURCE_BRANCH $GITHUB_WORKSPACE/kernel
          echo "KERNEL_SOURCE_DIR=$GITHUB_WORKSPACE/kernel" >> $GITHUB_ENV

      - name: Apply Droidspaces Patches
        working-directory: ${{ env.KERNEL_SOURCE_DIR }}
        run: |
          if [ -f $GITHUB_WORKSPACE/droidspaces_config.patch ]; then
            git apply $GITHUB_WORKSPACE/droidspaces_config.patch || echo "Patch may have been applied, continuing..."
          fi

      - name: Build kernel
        working-directory: ${{ env.KERNEL_SOURCE_DIR }}
        run: |
          export ARCH=arm64
          export EXTRA_CMD="$EXTRA_CMD"
          export DISABLE_LTO=$DISABLE_LTO
          export USE_OVERLAYS=$USE_OVERLAYS
          export KERNEL_IMAGE=$KERNEL_IMAGE
          export KERNEL_CONFIG=$KERNEL_CONFIG
          bash build.sh

      - name: Package AnyKernel3
        run: |
          git clone https://github.com/osm0sis/AnyKernel3 -b master
          cd AnyKernel3
          cp -f $KERNEL_SOURCE_DIR/arch/arm64/boot/Image.gz-dtb ./
          zip -r9 ../AnyKernel3_Image.gz . -x .git README.md

      - name: Upload AnyKernel3
        uses: actions/upload-artifact@v4
        with:
          name: AnyKernel3
          path: AnyKernel3_Image.gz
